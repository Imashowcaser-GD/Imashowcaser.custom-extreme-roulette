name: Build Mod

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          path: ./
          combine: true
